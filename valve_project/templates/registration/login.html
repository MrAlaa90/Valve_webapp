{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Login" %} - Valves Workshop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #198754 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 15px;
            border: none;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #198754;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center">
    <div class="card p-4 shadow-lg login-card">
        <!-- شعار الورشة -->
        <div class="text-center mb-4">
            <img src="{% static 'images/workshop-logo.png' %}" alt="Workshop Logo" style="width:80px;">
            <h3 class="mt-2 text-primary">Valves Workshop</h3>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger py-2 small text-center">
                {% trans "Invalid username or password." %}
            </div>
        {% endif %}

        {% if next %}
            <div class="alert alert-info py-2 small text-center">
                {% trans "Please log in to continue." %}
            </div>
        {% endif %}

        <!-- فورم تسجيل الدخول -->
        <form method="post" action="{% url 'valves:login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label small fw-bold">{% trans "Username or Email" %}</label>
                <input type="text" name="username" id="id_username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label for="id_password" class="form-label small fw-bold">{% trans "Password" %}</label>
                <div class="input-group">
                    <input type="password" name="password" id="id_password" class="form-control" required>
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="rememberme">
                <label class="form-check-label small" for="rememberme">{% trans "Remember Me" %}</label>
            </div>
            <button type="submit" class="btn btn-success w-100 shadow-sm">{% trans "Login" %}</button>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</div>

<script>
function togglePassword() {
    const pass = document.getElementById("id_password");
    const icon = document.getElementById("toggleIcon");
    if (pass.type === "password") {
        pass.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        pass.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

</body>
</html>
